<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB32 platformer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            max-width: 100vw; 
            max-height: 100vh;
            object-fit: contain; 
            image-rendering: pixelated; 
            background: #111;
        }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #ffffff;
            padding: clamp(10px, 1.5vw, 20px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .status-panel {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #444;
            padding: clamp(6px, 0.8vw, 12px) clamp(10px, 1vw, 16px);
            width: fit-content;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform-origin: left top;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-panel.hidden {
            transform: translateX(calc(-100% - 40px)) scale(0.95);
            opacity: 0;
        }

        .data-table {
            border-collapse: collapse;
            font-size: clamp(10px, 0.85vw, 14px);
            min-width: clamp(200px, 18vw, 300px);
            line-height: 1.2;
        }

        .data-table td {
            padding: clamp(2px, 0.3vw, 4px) clamp(5px, 0.6vw, 10px);
            border-bottom: 1px solid #222;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .label { color: #888; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.9em; }
        .value { font-weight: 600; text-align: right; font-family: "JetBrains Mono", monospace; color: #00ffcc; }

        #overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(10, 10, 10, 0.98);
            padding: 40px;
            border: 1px solid #00ffcc;
            pointer-events: auto;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        #overlay-msg h2 { margin: 0 0 10px 0; font-size: 18px; font-weight: 500; }
        #overlay-msg p { margin: 0; font-size: 14px; color: #ccc; }

        #pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #555;
            padding: 30px;
            color: white;
            z-index: 25;
            min-width: 250px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        #pause-menu.hidden {
            display: none;
        }

        #pause-menu h2 { margin: 0 0 20px 0; font-size: 22px; text-align: center; color: #00ffcc; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .setting-row input[type="range"] {
            width: 100px;
        }

        .setting-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ffcc;
        }
        
        .pause-hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            background: #00ffcc;
            color: black;
            border: none;
            padding: 10px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: background 0.2s;
            pointer-events: auto;
        }

        .btn:hover {
            background: #00cca3;
        }

        #crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 15;
            display: block;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 204, 0.8);
        }
        #crosshair::before {
            top: 9px; left: 0; width: 20px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 9px; width: 2px; height: 20px;
        }
    </style>

    <script type="text/javascript">
        window['libopenmpt'] = {};
        window.audioSystemReady = false;

        libopenmpt.locateFile = function (filename) {
            return filename;
        };
        
        libopenmpt.onRuntimeInitialized = function () {
            window.audioSystemReady = true;
            const audioStatus = document.getElementById('audio-track');
            if (audioStatus && audioStatus.innerText === 'Standby') {
                audioStatus.innerText = 'Engine mapped (Stereo)';
            }
        };
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="status-panel">
            <table class="data-table">
                <tr><td class="label">Status</td><td class="value" id="sys-status">Awaiting init</td></tr>
                <tr><td class="label">Current stage</td><td class="value" id="current-level">1</td></tr>
                <tr><td class="label">Score</td><td class="value" id="player-score">0</td></tr>
                <tr><td class="label">Lives</td><td class="value" id="player-lives">4</td></tr>
                <tr><td class="label">Integrity</td><td class="value" id="player-health">100%</td></tr>
                <tr><td class="label">Weapon pitch</td><td class="value" id="gun-angle">0.0&deg;</td></tr>
                <tr><td class="label">Audio engine</td><td class="value" id="audio-track">Standby</td></tr>
                <tr><td class="label">Resolution ([/])</td><td class="value" id="res-scale">1.0x</td></tr>
                <tr><td class="label">Player coordinates</td><td class="value" id="player-pos">0.0, 0.0, 0.0</td></tr>
            </table>
        </div>
    </div>

    <div id="overlay-msg">
        <h2>System initialization?</h2>
        <p>Please wait until audio engine initialises in the top left corner and then click this button.</p>
    </div>

    <div id="pause-menu" class="hidden">
        <h2>_</h2>
        <div class="setting-row">
            <label for="opt-vol">This slider is useless</label>
            <input type="range" id="opt-vol" min="0" max="100" value="50">
        </div>
        <div class="setting-row">
            <label for="opt-shadows">Shadows</label>
            <input type="checkbox" id="opt-shadows" checked>
        </div>
        <div class="setting-row">
            <label for="opt-blur">Post processing effects</label>
            <input type="checkbox" id="opt-blur">
        </div>
        <button id="btn-new-game" class="btn">New Game</button>
        <div class="pause-hint">Press 'P' to resume</div>
    </div>

    <script src="three.min.js"></script>
    <script type="text/javascript" src="libopenmpt.js"></script>
    <script type="text/javascript" src="chiptune2.js"></script>
    <script src="game.js"></script>
</body>
</html>
